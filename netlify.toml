[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# SPA redirect — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API functions available at /api/*
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"
